<div class="panel">
    <h2 class="panel-title">📝 이슈 내용 입력</h2>
    
    <div class="form-group">
        <label class="label-accent-red">📌 현상 요약 (AS-IS 경로 제외)</label>
        <input type="text" id="title" class="form-control" placeholder="현상을 입력하세요" spellcheck="true" lang="ko" oninput="generateTemplate()">
    </div>

    <div class="prefix-panel">
        <label class="prefix-title d-block mb-2">🔹 제목 Prefix 상세 조건 (선택)</label>
        <div class="grid-2 prefix-grid">
            <div class="form-group-sm">
                <label class="form-label-sm">환경</label>
                <div class="input-stack">
                    <select id="prefix_env" class="form-control" onchange="document.getElementById('prefix_env_custom').classList.toggle('d-none', this.value !== 'direct'); generateTemplate();">
                        <option value="">선택</option>
                        <option value="상용">상용</option>
                        <option value="STG/상용">STG/상용</option>
                        <option value="direct">기타</option>
                    </select>
                    <input type="text" id="prefix_env_custom" class="form-control d-none" placeholder="환경 입력" oninput="generateTemplate()">
                </div>
            </div>
            <div class="form-group-sm">
                <label class="form-label-sm">브라우저</label>
                <div class="input-stack">
                    <div class="checkbox-wrap-group">
                        <label class="checkbox-label text-sm"><input type="checkbox" id="prefix_browser_none" value="해당없음" checked onchange="if(this.checked) { document.querySelectorAll('.prefix-browser-cb').forEach(cb => cb.checked = false); document.getElementById('prefix_browser_custom').classList.add('d-none'); } generateTemplate();"> 해당없음</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" value="삼성브라우저" onchange="if(this.checked) document.getElementById('prefix_browser_none').checked = false; generateTemplate();"> 삼성</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" value="크롬" onchange="if(this.checked) document.getElementById('prefix_browser_none').checked = false; generateTemplate();"> 크롬</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" value="엣지" onchange="if(this.checked) document.getElementById('prefix_browser_none').checked = false; generateTemplate();"> 엣지</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" value="Safari" onchange="if(this.checked) document.getElementById('prefix_browser_none').checked = false; generateTemplate();"> Safari</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" id="prefix_browser_etc" value="기타" onchange="if(this.checked) { document.getElementById('prefix_browser_none').checked = false; document.getElementById('prefix_browser_custom').classList.remove('d-none'); } else { document.getElementById('prefix_browser_custom').classList.add('d-none'); } generateTemplate();"> 기타</label>
                    </div>
                    <input type="text" id="prefix_browser_custom" class="form-control d-none" placeholder="브라우저 입력" oninput="generateTemplate()">
                </div>
            </div>
            <div class="form-group-sm">
                <label class="form-label-sm">OS</label>
                <div class="input-stack">
                    <select id="osType" class="form-control" onchange="document.getElementById('osType_custom').classList.toggle('d-none', this.value !== 'direct'); syncEnvironmentByOS(); generateTemplate();">
                        <option value="">해당없음</option>
                        <option value="Android/iOS">Android/iOS</option>
                        <option value="Android">Android</option>
                        <option value="iOS">iOS</option>
                        <option value="모바일">모바일</option>
                        <option value="태블릿">태블릿</option>
                        <option value="모바일/태블릿">모바일/태블릿</option>
                        <option value="direct">기타</option>
                    </select>
                    <input type="text" id="osType_custom" class="form-control d-none" placeholder="OS 입력" oninput="generateTemplate(); syncEnvironmentByOS();">
                </div>
            </div>
            <div class="form-group-sm">
                <label class="form-label-sm">PoC</label>
                <div class="input-stack">
                    <select id="poc" class="form-control" onchange="document.getElementById('poc_custom').classList.toggle('d-none', this.value !== 'direct'); handlePocChange(); generateTemplate();">
                        <option value="T 멤버십">T 멤버십</option>
                        <option value="PC Web">PC Web</option>
                        <option value="PC M.Web">PC M.Web</option>
                        <option value="AI Layer">AI Layer</option>
                        <option value="Admin">Admin</option>
                        <option value="direct">기타</option>
                    </select>
                    <input type="text" id="poc_custom" class="form-control d-none" placeholder="PoC 입력" oninput="generateTemplate()">
                </div>
            </div>
            <div class="form-group-sm">
                <label class="form-label-sm">Critical 구분</label>
                <div class="input-stack">
                    <select id="prefix_critical" class="form-control" onchange="document.getElementById('prefix_critical_custom').classList.toggle('d-none', this.value !== 'direct'); generateTemplate();">
                        <option value="">해당없음</option>
                        <option value="Block">Block</option>
                        <option value="Crash">Crash</option>
                        <option value="direct">기타</option>
                    </select>
                    <input type="text" id="prefix_critical_custom" class="form-control d-none" placeholder="Critical 입력" oninput="generateTemplate()">
                </div>
            </div>
            <div class="form-group-sm">
                <label class="form-label-sm">Device</label>
                <input type="text" id="prefix_device" class="form-control" placeholder="예: 폴드" oninput="generateTemplate()">
            </div>
            <div class="form-group-sm">
                <label class="form-label-sm">계정</label>
                <input type="text" id="prefix_account" class="form-control" placeholder="예: VIP" oninput="generateTemplate()">
            </div>
            <div class="form-group-sm">
                <label class="form-label-sm">이슈 발생 페이지</label>
                <input type="text" id="prefix_page" class="form-control" placeholder="예: 출석체크" oninput="generateTemplate()">
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>서버</label>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="STG" checked onchange="generateTemplate()"> STG</label>
            <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="GRN" onchange="generateTemplate()"> GRN</label>
            <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="PRD" onchange="generateTemplate()"> 상용(PRD)</label>
        </div>
    </div>
    
    <div class="form-group" id="deviceGroup">
        <label>디바이스 선택</label>
        <div class="device-split-container">
            <div id="andDeviceCol" class="device-col">
                <div class="device-col-header">
                    <span class="text-accent-green">Android</span>
                    <div class="radio-tab-group small">
                        <label class="radio-tab"><input type="radio" name="and_dev_mode" value="normal" checked onchange="toggleDeviceMode('and')"> <span>검증</span></label>
                        <label class="radio-tab"><input type="radio" name="and_dev_mode" value="special" onchange="toggleDeviceMode('and')"> <span>특수</span></label>
                    </div>
                </div>
                <div id="andNormalList" class="pill-group"></div>
                <div id="andSpecialList" class="pill-group d-none"></div>
            </div>
            <div id="iosDeviceCol" class="device-col">
                <div class="device-col-header">
                    <span class="text-accent-blue">iOS</span>
                    <div class="radio-tab-group small">
                        <label class="radio-tab"><input type="radio" name="ios_dev_mode" value="normal" checked onchange="toggleDeviceMode('ios')"> <span>검증</span></label>
                        <label class="radio-tab"><input type="radio" name="ios_dev_mode" value="special" onchange="toggleDeviceMode('ios')"> <span>특수</span></label>
                    </div>
                </div>
                <div id="iosNormalList" class="pill-group"></div>
                <div id="iosSpecialList" class="pill-group d-none"></div>
            </div>
        </div>
    </div>

    <div class="form-group" id="appVersionGroup">
        <div class="label-action-row">
            <label id="appVersionLabel">버전</label>
            <div id="ios-ver-toggle" class="d-none radio-tab-group-sm">
                <label class="checkbox-label text-sm"><input type="radio" name="ios_ver_type" value="TestFlight" checked onchange="syncEnvironmentByOS()"> TestFlight</label>
                <label class="checkbox-label text-sm"><input type="radio" name="ios_ver_type" value="App Distribution" onchange="syncEnvironmentByOS()"> App Distribution</label>
            </div>
        </div>
        <div class="checkbox-wrap-group mb-2">
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_android" class="ver-type-cb" value="Android" onchange="syncDeviceFromVersion('and'); updateVersionTextbox(); generateTemplate();"> Android</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_ios" class="ver-type-cb" value="iOS" onchange="syncDeviceFromVersion('ios'); updateVersionTextbox(); generateTemplate();"> iOS</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_samsung" class="ver-type-cb" value="삼성 브라우저" onchange="updateVersionTextbox(); generateTemplate();"> 삼성 브라우저</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_safari" class="ver-type-cb" value="Safari" onchange="updateVersionTextbox(); generateTemplate();"> Safari</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_chrome" class="ver-type-cb" value="크롬" onchange="updateVersionTextbox(); generateTemplate();"> 크롬</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_edge" class="ver-type-cb" value="Edge" onchange="updateVersionTextbox(); generateTemplate();"> Edge</label>
        </div>
        <input type="text" id="appVersion" class="form-control" oninput="generateTemplate()">
    </div>

    <div class="form-group d-none" id="urlGroup">
        <label id="urlLabel">URL</label>
        <input type="text" id="targetUrl" class="form-control" oninput="generateTemplate()">
    </div>

    <div class="form-group d-none" id="aiModeGroup">
        <label>■ 모드</label>
        <select id="aiMode" class="form-control" onchange="generateTemplate()">
            <option value="자동(default)">자동(default)</option>
            <option value="테스트 모드">테스트 모드</option>
            <option value="QA 모드">QA 모드</option>
            <option value="일반 모드">일반 모드</option>
            <option value="A Bucket">A Bucket</option>
            <option value="B Bucket">B Bucket</option>
        </select>
    </div>

    <div class="form-group">
        <label>[Pre-Condition]</label>
        <textarea id="preCondition" class="form-control" oninput="generateTemplate()"></textarea>
    </div>

    <div class="form-group">
        <div class="label-action-row">
            <label>[재현스텝]</label>
            <div class="case-ctrl-row">
                <button class="btn-case-main" onclick="addCase('steps')">CASE +</button>
                <div class="case-num-group">
                    <span onclick="applyIndividualPreset('steps', 2)">2</span>
                    <span onclick="applyIndividualPreset('steps', 3)">3</span>
                    <span onclick="applyIndividualPreset('steps', 4)">4</span>
                </div>
            </div>
        </div>
        <textarea id="steps" class="form-control" oninput="generateTemplate()"></textarea>
    </div>

    <div class="form-group">
        <div class="label-action-row">
            <label>[실행결과-문제현상]</label>
            <div class="case-ctrl-row">
                <button class="btn-case-main" onclick="addCase('actualResult')">CASE +</button>
                <div class="case-num-group">
                    <span onclick="applyIndividualPreset('actualResult', 2)">2</span>
                    <span onclick="applyIndividualPreset('actualResult', 3)">3</span>
                    <span onclick="applyIndividualPreset('actualResult', 4)">4</span>
                </div>
            </div>
        </div>
        <textarea id="actualResult" class="form-control" oninput="generateTemplate()"></textarea>
    </div>

    <div class="form-group">
        <div class="label-action-row">
            <label>[기대결과]</label>
            <div class="case-ctrl-row">
                <button class="btn-case-main" onclick="addCase('expectedResult')">CASE +</button>
                <div class="case-num-group">
                    <span onclick="applyIndividualPreset('expectedResult', 2)">2</span>
                    <span onclick="applyIndividualPreset('expectedResult', 3)">3</span>
                    <span onclick="applyIndividualPreset('expectedResult', 4)">4</span>
                </div>
            </div>
        </div>
        <textarea id="expectedResult" class="form-control" oninput="generateTemplate()"></textarea>
    </div>
    
    <div class="form-group">
        <label>[참고사항]</label>
        <input type="text" id="ref_prd" class="form-control mb-2" placeholder="1. 상용 재현 여부" oninput="generateTemplate()">
        <textarea id="ref_notes" class="form-control" placeholder="기타 참고 내용" oninput="generateTemplate()"></textarea>
    </div>
</div>
