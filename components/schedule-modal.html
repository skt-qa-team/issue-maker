<div class="modal-overlay" id="scheduleModal" style="display: none;">
    <div class="modal-content" style="max-width: 650px; width: 90%; padding: 30px; border-top: 6px solid var(--accent-blue);">
        <button class="close-btn" onclick="closeScheduleModal()" style="top: 20px; right: 20px;">×</button>
        <div class="modal-header" style="margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <h2 style="margin: 0; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.5rem;">📅</span> QA 및 배포 일정 등록
            </h2>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-size: 0.9rem; font-weight: 700; margin-bottom: 8px;">일정 제목 <span style="color: var(--accent-red);">*</span></label>
            <input type="text" id="sch_title" placeholder="예: V21.18 상용 배포 QA" style="font-size: 1.1rem; padding: 12px;">
        </div>
        
        <div class="grid-2" style="gap: 20px; margin-bottom: 20px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label style="font-size: 0.9rem; font-weight: 700; margin-bottom: 8px;">시작일 <span style="color: var(--accent-red);">*</span></label>
                <input type="date" id="sch_start" style="padding: 10px; font-family: inherit;">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label style="font-size: 0.9rem; font-weight: 700; margin-bottom: 8px;">종료일 <span style="color: var(--accent-red);">*</span></label>
                <input type="date" id="sch_end" style="padding: 10px; font-family: inherit;">
            </div>
        </div>
        
        <div class="form-group" style="background: rgba(59, 130, 246, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--accent-blue);">
            <label style="color: var(--accent-blue); font-weight: 800; display: flex; align-items: center; gap: 5px; margin-bottom: 8px;">
                🔗 Epic Link (이슈 폼 자동 연동)
            </label>
            <input type="text" id="sch_epic" placeholder="예: SKM-1024" style="border-color: var(--accent-blue); background: #fff;">
            <p style="font-size: 0.75rem; color: var(--text-sub); margin-top: 5px; margin-bottom: 0;">'일정 시작' 버튼 클릭 시, 이슈 폼의 '발생 페이지' 란에 해당 코드가 자동 입력됩니다.</p>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-size: 0.9rem; font-weight: 700; margin-bottom: 8px;">일정 라벨 색상</label>
            <div class="radio-tab-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <label class="radio-tab" style="flex: 1;"><input type="radio" name="sch_color" value="#3b82f6" checked> <span style="font-weight: 800; color: #3b82f6;">검증 (Blue)</span></label>
                <label class="radio-tab" style="flex: 1;"><input type="radio" name="sch_color" value="#10b981"> <span style="font-weight: 800; color: #10b981;">배포 (Green)</span></label>
                <label class="radio-tab" style="flex: 1;"><input type="radio" name="sch_color" value="#ef4444"> <span style="font-weight: 800; color: #ef4444;">핫픽스 (Red)</span></label>
                <label class="radio-tab" style="flex: 1;"><input type="radio" name="sch_color" value="#8b5cf6"> <span style="font-weight: 800; color: #8b5cf6;">기타 (Purple)</span></label>
            </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 10px;">
            <label style="font-size: 0.9rem; font-weight: 700; margin-bottom: 8px;">상세 내용 (선택)</label>
            <textarea id="sch_desc" placeholder="테스트 범위, 특이사항 등을 자유롭게 입력하세요" style="height: 100px; padding: 12px; resize: vertical;"></textarea>
        </div>
        
        <div class="modal-actions" style="display: flex; gap: 15px; margin-top: 30px;">
            <button class="btn-save" style="flex: 1; padding: 14px; font-size: 1.1rem; font-weight: 800; background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color);" onclick="saveSchedule()">💾 일정 전사 공유</button>
            <button class="btn-case-main" style="flex: 1; padding: 14px; font-size: 1.1rem; font-weight: 800; background: var(--accent-blue); color: white; border: none; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);" onclick="startScheduleWorkflow()">🚀 일정 시작 (Epic 연동)</button>
        </div>
    </div>
</div>
