<div class="modal-overlay" id="scheduleDetailModal" style="display: none;">
    <div class="modal-content" style="max-width: 550px; width: 90%; padding: 0; overflow: hidden; border-radius: 16px;">
        <div id="detail_color_bar" style="height: 10px; width: 100%;"></div>
        <div style="padding: 30px;">
            <button class="close-btn" onclick="closeScheduleDetail()" style="top: 20px; right: 20px;">×</button>
            <div style="margin-bottom: 25px;">
                <h2 id="detail_title" style="margin: 0 0 10px 0; font-size: 1.6rem; font-weight: 800; color: var(--text-main);">일정 제목</h2>
                <p id="detail_date" style="margin: 0; color: var(--text-sub); font-weight: 600; font-size: 1rem;">2026-04-14 ~ 2026-04-17</p>
            </div>

            <div style="background: var(--bg-color); padding: 20px; border-radius: 12px; margin-bottom: 25px;">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 4px; font-weight: 700;">EPIC LINK</label>
                    <div id="detail_epic" style="font-weight: 800; color: var(--accent-blue); font-size: 1.1rem;">SKM-1234</div>
                </div>
                <div>
                    <label style="display: block; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 4px; font-weight: 700;">상세 내용</label>
                    <div id="detail_desc" style="line-height: 1.6; color: var(--text-main); white-space: pre-wrap;">상세 내용이 표시됩니다.</div>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-case-main" style="flex: 2; padding: 12px; font-weight: 800; background: var(--accent-blue); color: white; border: none; border-radius: 8px;" onclick="startScheduleWorkflow()">🚀 일정 시작 (Epic 연동)</button>
                <button style="flex: 1; padding: 12px; font-weight: 700; background: #fff; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;" onclick="editSchedule()">수정</button>
                <button style="flex: 1; padding: 12px; font-weight: 700; background: #fff; border: 1px solid #fee2e2; color: #ef4444; border-radius: 8px; cursor: pointer;" onclick="deleteSchedule()">삭제</button>
            </div>
        </div>
    </div>
</div>
