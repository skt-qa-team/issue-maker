<div class="modal-overlay" id="completionModal">
    <div class="modal-content modal-xl">
        <button class="close-btn" onclick="closeCompletionModal()">×</button>
        
        <div class="modal-header modal-header-col">
            <h2 class="modal-title">✅ 완료문 작성</h2>
            <div class="fix-owner-alert">🚨 <u>이슈 수정 후 Fix Owner 잊지 말기</u></div>
        </div>
        
        <div class="completion-modal-body">
            <div class="setting-box completion-form-side">
                <div class="form-group mb-2">
                    <label class="form-label-sm">■ POC</label>
                    <select id="comp_poc" class="form-control text-md font-bold" onchange="handleCompPocChange()">
                        <option value="T 멤버십">T 멤버십</option>
                        <option value="에이닷">에이닷</option>
                        <option value="PC Web">PC Web</option>
                        <option value="AI Layer">AI Layer</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                
                <div class="form-group mb-2" id="comp_device_group">
                    <label class="form-label-sm">■ Device(OS Ver.)</label>
                    <div id="comp_device_area" class="comp-device-scroll border-box radius-md p-2">
                        <div id="comp_and_section">
                            <div class="text-accent-green mb-1 text-sm font-bold">Android</div>
                            <div id="comp_and_list" class="pill-group mb-2"></div>
                        </div>
                        <div id="comp_ios_section">
                            <div class="text-accent-blue mb-1 text-sm font-bold">iOS</div>
                            <div id="comp_ios_list" class="pill-group"></div>
                        </div>
                    </div>
                </div>

                <div class="grid-2 mb-2">
                    <div class="form-group">
                        <label class="form-label-sm">■ 버전</label>
                        <div id="comp_version_list" class="checkbox-group vertical"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label-sm">■ 서버</label>
                        <div id="comp_server_list" class="checkbox-group vertical"></div>
                    </div>
                </div>
                
                <div class="form-group d-none mb-2" id="comp_url_group">
                    <label class="form-label-sm">■ URL</label>
                    <input type="text" id="comp_url" class="form-control" placeholder="URL을 입력하세요">
                </div>

                <div class="form-group">
                    <label class="form-label-sm">■ 현상 check</label>
                    <textarea id="comp_check" class="form-control" style="height: 100px;" placeholder="확인 내용을 입력하세요"></textarea>
                </div>
            </div>
            
            <div class="completion-preview-side">
                <div class="setting-box preview-box h-100 flex-col">
                    <label class="form-label-sm text-white mb-2">📊 미리보기</label>
                    <textarea id="comp_preview" class="output-field preview-area flex-1" readonly></textarea>
                </div>
                <button class="btn-save mt-2" onclick="copyCompletionReport()">📋 완료문 복사하기</button>
            </div>
        </div>
    </div>
</div>
