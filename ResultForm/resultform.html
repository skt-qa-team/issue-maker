<div class="panel result-panel">
    <div class="result-header">
        <h2>📄 리포트 결과</h2>
        <button id="btnResultClear" class="btn-clear-top">🔄 새로 작성</button>
    </div>
    
    <div class="output-section">
        <div class="output-label-group">
            <label>📌 제목 (Title)</label>
            <button class="btn-copy-mini btn-copy-target" data-target="outputTitle">제목만 복사</button>
        </div>
        <input type="text" id="outputTitle" class="output-field" readonly>
    </div>

    <div class="output-section result-body-section">
        <div class="output-label-group">
            <label>📝 본문 (Description)</label>
            <button class="btn-copy-mini btn-copy-target" data-target="outputBody">본문만 복사</button>
        </div>
        <textarea id="outputBody" class="output-field result-textarea" readonly></textarea>
    </div>
</div>
