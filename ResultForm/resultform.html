<div class="panel result-panel">
    <div class="result-header">
        <h2 class="panel-title">📄 리포트 결과</h2>
        <button id="btnResultClear" class="btn-clear-top" onclick="window.QA_CORE.Form.clearForm()">🔄 새로 작성</button>
    </div>
    
    <div class="output-section">
        <div class="output-label-group">
            <label class="output-label">📌 제목 (Title)</label>
            <button class="btn-copy-mini" onclick="window.QA_CORE.UX.copySpecific('outputTitle')">제목만 복사</button>
        </div>
        <input type="text" id="outputTitle" class="output-field-title" readonly>
    </div>

    <div class="output-section result-body-section">
        <div class="output-label-group">
            <label class="output-label">📝 본문 (Description)</label>
            <button class="btn-copy-mini" onclick="window.QA_CORE.UX.copySpecific('outputBody')">본문만 복사</button>
        </div>
        <textarea id="outputBody" class="output-field result-textarea" readonly></textarea>
    </div>
</div>
