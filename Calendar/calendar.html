<div class="cal-wrapper">
    <div class="cal-header">
        <div class="cal-title-group">
            <button id="btn-prev-month" class="cal-nav-btn">◀</button>
            <h2 id="cal-month-year"></h2>
            <button id="btn-next-month" class="cal-nav-btn">▶</button>
            <button id="btn-today" class="btn-outline-sm">오늘</button>
        </div>
        <div class="cal-actions">
            <button id="btn-add-schedule" class="btn-primary">+ 일정 추가</button>
        </div>
    </div>
    
    <div class="cal-body">
        <div class="cal-weekdays">
            <div class="weekday sun">일</div>
            <div class="weekday">월</div>
            <div class="weekday">화</div>
            <div class="weekday">수</div>
            <div class="weekday">목</div>
            <div class="weekday">금</div>
            <div class="weekday sat">토</div>
        </div>
        <div id="cal-grid" class="cal-grid"></div>
    </div>
</div>
