<div id="scheduleModal" class="modal-overlay d-none">
    <div class="modal-content modal-schedule">
        <div class="modal-header">
            <h2 id="modal_title">📅 일정 등록/수정</h2>
            <button class="close-btn" onclick="window.closeScheduleModal()">×</button>
        </div>
        
        <div class="modal-body">
            <input type="hidden" id="sch_id">
            
            <div id="ai_dropzone" class="ai-dropzone">
                <div id="ai_dropzone_content">
                    <span>📸 일정표 스크린샷 붙여넣기 (Ctrl+V)</span>
                </div>
                <div id="ai_loading_content" class="d-none">
                    <div class="spinner"></div>
                    <span>AI가 일정을 분석 중입니다...</span>
                </div>
            </div>
            <div id="ai_quota_info" class="ai-quota-info">⚡ 오늘 AI 자동 등록 남은 횟수: 20 / 20</div>

            <div class="form-group">
                <label>구분 *</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="sch_color" value="#3b82f6" data-type="검증" checked>
                        <span class="radio-label color-blue">검증</span>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="sch_color" value="#10b981" data-type="회의">
                        <span class="radio-label color-green">회의</span>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="sch_color" value="#f59e0b" data-type="기타">
                        <span class="radio-label color-orange">기타</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label id="label_sch_start">시작일 *</label>
                <input type="date" id="sch_start" class="form-control">
            </div>

            <div class="form-group" id="group_sch_end">
                <label>종료일 *</label>
                <input type="date" id="sch_end" class="form-control">
            </div>

            <div class="form-group">
                <label>일정 제목 *</label>
                <input type="text" id="sch_title" class="form-control" placeholder="일정 제목을 입력하세요">
            </div>

            <div class="form-group" id="group_sch_epic">
                <label>Epic Link</label>
                <input type="text" id="sch_epic" class="form-control" placeholder="https://jira.com/browse/EPIC-123">
            </div>

            <div class="form-group">
                <label>상세 설명</label>
                <textarea id="sch_desc" class="form-control" placeholder="추가적인 메모를 입력하세요"></textarea>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-secondary" onclick="window.closeScheduleModal()">취소</button>
            <button class="btn-primary" onclick="window.saveSchedule()">저장하기</button>
        </div>
    </div>
</div>
