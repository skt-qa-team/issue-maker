<div id="bugReportModal" class="bug-modal-overlay d-none">
    <div class="bug-modal-container">
        <div class="bug-modal-header">
            <div class="header-title-group">
                <span class="header-icon">🛡️</span>
                <h2>QA Management Console</h2>
            </div>
            <button id="btn-close-bug-top" class="bug-close-btn">×</button>
        </div>
        
        <div class="bug-modal-body">
            <div class="bug-list-side">
                <div class="section-header">
                    <h3 class="bug-list-title">📋 Issue Pipeline</h3>
                    <div id="bug_pagination" class="bug-pagination"></div>
                </div>
                <div id="bug_list_container" class="bug-list-container">
                    <p class="bug-empty-text">데이터를 불러오는 중...</p>
                </div>
            </div>

            <div class="bug-action-side">
                <div class="bug-score-section">
                    <h3 class="bug-list-title">🏆 Top Contributors</h3>
                    <div id="score_rank_list" class="score-rank-container">
                        <p class="bug-empty-text">랭킹 집계 중...</p>
                    </div>
                </div>

                <div class="bug-write-section">
                    <h3 class="bug-list-title">✍️ Report New Issue</h3>
                    <div class="bug-form-group">
                        <label class="form-label-accent">Issue Description</label>
                        <textarea id="bug_description" class="bug-form-control" rows="5" placeholder="발생 위치와 재현 현상을 입력하세요."></textarea>
                    </div>
                    
                    <div class="bug-form-group mt-15">
                        <label class="form-label-accent">Priority & Type</label>
                        <select id="bug_type" class="bug-form-control">
                            <option value="ui">🎨 UI/UX Issue (0.5pt)</option>
                            <option value="functional">⚙️ Functional Defect (1.0pt)</option>
                        </select>
                    </div>

                    <div class="bug-write-footer">
                        <button id="btn-submit-bug" class="bug-btn-primary">제출하기</button>
                    </div>
                    <p class="bug-policy-tip">※ Admin 최종 승인(Sign-off) 시 점수가 지급됩니다.</p>
                </div>
            </div>
        </div>
    </div>
</div>
