<div class="panel" id="panel-issue">
    <div class="panel-header-flex">
        <h2 class="panel-title">📝 이슈 내용 입력</h2>
        <div class="preset-controls-inline">
            <select id="inputPresetSelect" class="form-control-sm preset-select" onchange="window.QA_CORE.InputForm.handleDropdown()">
                <option value="">💾 프리셋 선택...</option>
            </select>
            <input type="text" id="newPresetName" class="form-control-sm preset-name-input" placeholder="프리셋명 입력">
            <div class="preset-btn-group">
                <button id="btnSavePreset" class="btn-outline-sm" onclick="window.QA_CORE.InputForm.savePreset()">저장</button>
                <button id="btnEditPreset" class="btn-outline-sm d-none" onclick="window.QA_CORE.InputForm.editPreset()">수정</button>
                <button id="btnDeletePreset" class="btn-outline-sm btn-delete-preset" onclick="window.QA_CORE.InputForm.deletePreset()">삭제</button>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label class="label-accent-red">📌 현상 요약 (AS-IS 경로 제외)</label>
        <input type="text" id="title" class="form-control template-trigger" placeholder="현상을 입력하세요" spellcheck="true" lang="ko" oninput="window.QA_CORE.ResultForm.generate()">
    </div>

    <div class="prefix-panel">
        <div class="label-action-row">
            <label class="prefix-title">🔹 제목 Prefix 상세 조건 (선택)</label>
            <div class="case-ctrl-row">
                <button id="btnSavePrefixOrder" class="btn-outline-sm" onclick="window.QA_CORE.InputForm.applyAndSavePrefixOrder()">저장</button>
                <button id="btnResetPrefixOrder" class="btn-outline-sm" onclick="window.QA_CORE.InputForm.resetPrefixOrder()">초기화</button>
            </div>
        </div>
        <div class="prefix-grid" id="prefixContainer">
            <div class="prefix-item" data-id="env">
                <div class="prefix-label-row">
                    <label class="form-label-sm">환경</label>
                    <input type="number" class="prefix-order-input" data-target="env" min="1" max="7" value="1">
                </div>
                <div class="input-stack">
                    <select id="prefix_env" class="form-control template-trigger" onchange="window.QA_CORE.InputForm.toggleCustomInput('prefix_env')">
                        <option value="">선택</option>
                        <option value="상용">상용</option>
                        <option value="STG/상용">STG/상용</option>
                        <option value="direct">기타</option>
                    </select>
                    <input type="text" id="prefix_env_custom" class="form-control template-trigger d-none" placeholder="환경 입력" oninput="window.QA_CORE.ResultForm.generate()">
                </div>
            </div>
            
            <div class="prefix-item" data-id="os">
                <div class="prefix-label-row">
                    <label class="form-label-sm">OS</label>
                    <input type="number" class="prefix-order-input" data-target="os" min="1" max="7" value="2">
                </div>
                <div class="input-stack">
                    <select id="osType" class="form-control template-trigger" onchange="window.QA_CORE.InputForm.handleOsChange()">
                        <option value="">해당없음</option>
                        <option value="Android/iOS">Android/iOS</option>
                        <option value="Android">Android</option>
                        <option value="iOS">iOS</option>
                        <option value="모바일">모바일</option>
                        <option value="태블릿">태블릿</option>
                        <option value="모바일/태블릿">모바일/태블릿</option>
                        <option value="direct">기타</option>
                    </select>
                    <input type="text" id="osType_custom" class="form-control template-trigger d-none" placeholder="OS 입력" oninput="window.QA_CORE.ResultForm.generate()">
                </div>
            </div>

            <div class="prefix-item" data-id="poc">
                <div class="prefix-label-row">
                    <label class="form-label-sm">PoC</label>
                    <input type="number" class="prefix-order-input" data-target="poc" min="1" max="7" value="3">
                </div>
                <div class="input-stack">
                    <select id="poc" class="form-control template-trigger" onchange="window.QA_CORE.InputForm.handlePocChange()">
                        <option value="T 멤버십">T 멤버십</option>
                        <option value="PC Web">PC Web</option>
                        <option value="PC M.Web">PC M.Web</option>
                        <option value="AI Layer">AI Layer</option>
                        <option value="Admin">Admin</option>
                        <option value="direct">기타</option>
                    </select>
                    <input type="text" id="poc_custom" class="form-control template-trigger d-none" placeholder="PoC 입력" oninput="window.QA_CORE.ResultForm.generate()">
                </div>
            </div>

            <div class="prefix-item" data-id="critical">
                <div class="prefix-label-row">
                    <label class="form-label-sm">Critical 구분</label>
                    <input type="number" class="prefix-order-input" data-target="critical" min="1" max="7" value="4">
                </div>
                <div class="input-stack">
                    <select id="prefix_critical" class="form-control template-trigger" onchange="window.QA_CORE.InputForm.toggleCustomInput('prefix_critical')">
                        <option value="">해당없음</option>
                        <option value="Block">Block</option>
                        <option value="Crash">Crash</option>
                        <option value="direct">기타</option>
                    </select>
                    <input type="text" id="prefix_critical_custom" class="form-control template-trigger d-none" placeholder="Critical 입력" oninput="window.QA_CORE.ResultForm.generate()">
                </div>
            </div>

            <div class="prefix-item" data-id="device">
                <div class="prefix-label-row">
                    <label class="form-label-sm">Device</label>
                    <input type="number" class="prefix-order-input" data-target="device" min="1" max="7" value="5">
                </div>
                <div class="input-stack">
                    <div class="checkbox-wrap-group">
                        <label class="checkbox-label text-sm"><input type="checkbox" id="prefix_browser_none" value="해당없음" checked onchange="window.QA_CORE.InputForm.handleBrowserNone(this)"> 해당없음</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" value="삼성인터넷" onchange="window.QA_CORE.InputForm.toggleBrowserCustom()"> 삼성인터넷</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" value="Safari" onchange="window.QA_CORE.InputForm.toggleBrowserCustom()"> Safari</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" value="Chrome" onchange="window.QA_CORE.InputForm.toggleBrowserCustom()"> Chrome</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" value="Edge" onchange="window.QA_CORE.InputForm.toggleBrowserCustom()"> Edge</label>
                        <label class="checkbox-label text-sm"><input type="checkbox" class="prefix-browser-cb" id="prefix_browser_etc" value="기타" onchange="window.QA_CORE.InputForm.toggleBrowserCustom()"> 기타</label>
                    </div>
                    <input type="text" id="prefix_browser_custom" class="form-control template-trigger d-none" placeholder="브라우저 입력" oninput="window.QA_CORE.ResultForm.generate()">
                    <input type="text" id="prefix_device_input" class="form-control template-trigger" placeholder="예: 폴드" oninput="window.QA_CORE.ResultForm.generate()">
                </div>
            </div>
            
            <div class="prefix-item" data-id="account">
                <div class="prefix-label-row">
                    <label class="form-label-sm">계정</label>
                    <input type="number" class="prefix-order-input" data-target="account" min="1" max="7" value="6">
                </div>
                <input type="text" id="prefix_account" class="form-control template-trigger" placeholder="예: VIP" oninput="window.QA_CORE.ResultForm.generate()">
            </div>
            
            <div class="prefix-item" data-id="page">
                <div class="prefix-label-row">
                    <label class="form-label-sm">이슈 발생 페이지</label>
                    <input type="number" class="prefix-order-input" data-target="page" min="1" max="7" value="7">
                </div>
                <input type="text" id="prefix_page" class="form-control template-trigger" placeholder="예: 출석체크" oninput="window.QA_CORE.ResultForm.generate()">
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>서버</label>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="STG" checked onchange="window.QA_CORE.ResultForm.generate()"> STG</label>
            <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="GRN" onchange="window.QA_CORE.ResultForm.generate()"> GRN</label>
            <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="PRD" onchange="window.QA_CORE.ResultForm.generate()"> 상용(PRD)</label>
        </div>
    </div>
    
    <div class="form-group" id="deviceGroup">
        <label>디바이스 선택</label>
        <div class="device-split-container">
            <div id="andDeviceCol" class="device-col">
                <div class="device-col-header">
                    <span class="text-accent-green">Android</span>
                    <div class="radio-tab-group small">
                        <label class="radio-tab"><input type="radio" name="and_dev_mode" value="normal" checked onchange="window.QA_CORE.InputForm.switchDeviceMode('and', 'normal')"> <span>검증</span></label>
                        <label class="radio-tab"><input type="radio" name="and_dev_mode" value="special" onchange="window.QA_CORE.InputForm.switchDeviceMode('and', 'special')"> <span>특수</span></label>
                    </div>
                </div>
                <div id="andNormalList" class="pill-group"></div>
                <div id="andSpecialList" class="pill-group d-none"></div>
            </div>
            <div id="iosDeviceCol" class="device-col">
                <div class="device-col-header">
                    <span class="text-accent-blue">iOS</span>
                    <div class="radio-tab-group small">
                        <label class="radio-tab"><input type="radio" name="ios_dev_mode" value="normal" checked onchange="window.QA_CORE.InputForm.switchDeviceMode('ios', 'normal')"> <span>검증</span></label>
                        <label class="radio-tab"><input type="radio" name="ios_dev_mode" value="special" onchange="window.QA_CORE.InputForm.switchDeviceMode('ios', 'special')"> <span>특수</span></label>
                    </div>
                </div>
                <div id="iosNormalList" class="pill-group"></div>
                <div id="iosSpecialList" class="pill-group d-none"></div>
            </div>
        </div>
    </div>

    <div class="form-group" id="appVersionGroup">
        <div class="label-action-row">
            <label id="appVersionLabel">버전</label>
            <div id="ios-ver-toggle" class="d-none radio-tab-group-sm">
                <label class="checkbox-label text-sm"><input type="radio" name="ios_ver_type" value="TestFlight" checked onchange="window.QA_CORE.InputForm.updateVersionTextbox()"> TestFlight</label>
                <label class="checkbox-label text-sm"><input type="radio" name="ios_ver_type" value="App Distribution" onchange="window.QA_CORE.InputForm.updateVersionTextbox()"> App Distribution</label>
            </div>
        </div>
        <div class="checkbox-wrap-group mb-2">
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_android" class="ver-type-cb" value="Android" onchange="window.QA_CORE.InputForm.updateVersionTextbox()"> Android</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_ios" class="ver-type-cb" value="iOS" onchange="window.QA_CORE.InputForm.updateVersionTextbox()"> iOS</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_samsung" class="ver-type-cb" value="삼성인터넷" onchange="window.QA_CORE.InputForm.updateVersionTextbox()"> 삼성인터넷</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_safari" class="ver-type-cb" value="Safari" onchange="window.QA_CORE.InputForm.updateVersionTextbox()"> Safari</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_chrome" class="ver-type-cb" value="Chrome" onchange="window.QA_CORE.InputForm.updateVersionTextbox()"> Chrome</label>
            <label class="checkbox-label text-sm"><input type="checkbox" id="ver_cb_edge" class="ver-type-cb" value="Edge" onchange="window.QA_CORE.InputForm.updateVersionTextbox()"> Edge</label>
        </div>
        <input type="text" id="appVersion" class="form-control" oninput="window.QA_CORE.ResultForm.generate()">
    </div>

    <div class="form-group d-none" id="urlGroup">
        <label id="urlLabel">URL</label>
        <input type="text" id="targetUrl" class="form-control" oninput="window.QA_CORE.ResultForm.generate()">
    </div>

    <div class="form-group d-none" id="aiModeGroup">
        <label>■ 모드</label>
        <select id="aiMode" class="form-control" onchange="window.QA_CORE.ResultForm.generate()">
            <option value="자동(default)">자동(default)</option>
            <option value="테스트 모드">테스트 모드</option>
            <option value="QA 모드">QA 모드</option>
            <option value="일반 모드">일반 모드</option>
            <option value="A Bucket">A Bucket</option>
            <option value="B Bucket">B Bucket</option>
        </select>
    </div>

    <div class="form-group">
        <label>[Pre-Condition]</label>
        <textarea id="preCondition" class="form-control" oninput="window.QA_CORE.ResultForm.generate()"></textarea>
    </div>

    <div class="form-group">
        <div class="label-action-row">
            <label>[재현스텝]</label>
            <div class="case-ctrl-row">
                <button class="btn-case-main" onclick="window.QA_CORE.InputForm.addCase('steps')">CASE +</button>
                <button class="btn-case-reset" onclick="window.QA_CORE.InputForm.resetCase('steps')">초기화</button>
            </div>
        </div>
        <textarea id="steps" class="form-control" oninput="window.QA_CORE.ResultForm.generate()"></textarea>
    </div>

    <div class="form-group">
        <div class="label-action-row">
            <label>[실행결과-문제현상]</label>
            <div class="case-ctrl-row">
                <button class="btn-case-main" onclick="window.QA_CORE.InputForm.addCase('actualResult')">CASE +</button>
                <button class="btn-case-reset" onclick="window.QA_CORE.InputForm.resetCase('actualResult')">초기화</button>
            </div>
        </div>
        <textarea id="actualResult" class="form-control" oninput="window.QA_CORE.ResultForm.generate()"></textarea>
    </div>

    <div class="form-group">
        <div class="label-action-row">
            <label>[기대결과]</label>
            <div class="case-ctrl-row">
                <button class="btn-case-main" onclick="window.QA_CORE.InputForm.addCase('expectedResult')">CASE +</button>
                <button class="btn-case-reset" onclick="window.QA_CORE.InputForm.resetCase('expectedResult')">초기화</button>
            </div>
        </div>
        <textarea id="expectedResult" class="form-control" oninput="window.QA_CORE.ResultForm.generate()"></textarea>
    </div>
    
    <div class="form-group">
        <label>[참고사항]</label>
        <input type="text" id="ref_prd" class="form-control" placeholder="1. 상용 재현 여부" oninput="window.QA_CORE.ResultForm.generate()">
        <textarea id="ref_notes" class="form-control mt-2" placeholder="기타 참고 내용" oninput="window.QA_CORE.ResultForm.generate()"></textarea>
    </div>
</div>
