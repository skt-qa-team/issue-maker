<div id="bookmark-panel" class="bookmark-panel-container">
    <div class="bm-header">
        <div class="bm-header-title-group">
            <h2 class="bm-title">🔖 공용 북마크 센터</h2>
            <span class="bm-badge">SYNC LIVE</span>
        </div>
    </div>
    <div class="bm-body">
        <div class="bm-sidebar">
            <div class="bm-sidebar-actions">
                <button class="bm-sidebar-btn" onclick="window.QA_CORE.Bookmark.addFolder()">+ 폴더 추가</button>
                <button class="bm-sidebar-btn" onclick="window.QA_CORE.Bookmark.openAdd()">+ 링크 추가</button>
            </div>
            <div id="bm_folder_list" class="bm-folder-tree"></div>
        </div>
        <div class="bm-main">
            <div class="bm-add-link-form d-none" id="bm_add_form">
                <h4 id="bm_form_title" class="bm-form-title">🔗 링크 추가</h4>
                <input type="text" id="bm_input_name" class="bm-input" placeholder="사이트 닉네임">
                <input type="text" id="bm_input_url" class="bm-input" placeholder="URL (예: https://...)">
                <div class="bm-form-actions">
                    <button class="bm-btn-cancel" onclick="window.QA_CORE.Bookmark.toggleForm(false)">취소</button>
                    <button class="bm-btn-save" id="bm_save_btn" onclick="window.QA_CORE.Bookmark.saveLink()">저장하기</button>
                </div>
            </div>
            <div class="bm-folder-header">
                <h3 id="bm_current_folder_title" class="bm-current-folder-title">📂 폴더를 선택하세요</h3>
            </div>
            <div id="bm_link_list" class="bm-link-list"></div>
        </div>
    </div>
</div>
