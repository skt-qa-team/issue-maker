<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA System Pro</title>
    
    <link rel="stylesheet" href="Core/Styles/main.css">
    <script src="Core/Scripts/error-handler.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js" defer></script>
    
    <script src="Core/Scripts/firebase-auth.js" defer></script>
    <script src="Core/Scripts/ui.js" defer></script>
    <script src="Core/Scripts/ux.js" defer></script>
    
    <script src="Admin/admin.js" defer></script>
    <script src="Bookmark/bookmark.js" defer></script>
    <script src="Bugreport/bugreport.js" defer></script>
    <script src="Calendar/calendar.js" defer></script>
    <script src="Calendar/schedule.js" defer></script>
    <script src="Completion/completion-input.js" defer></script>
    <script src="Completion/completion-result.js" defer></script>
    <script src="Condition/condition.js" defer></script>
    <script src="History/history.js" defer></script>
    <script src="InputForm/inputform.js" defer></script>
    <script src="Kpi/kpi.js" defer></script>
    <script src="ResultForm/resultform.js" defer></script>
    <script src="Setting/setting.js" defer></script>
    <script src="Theme/theme.js" defer></script>
    <script src="GuideForm/guideform.js" defer></script>
    
    <script src="Core/Scripts/loader.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-container">
        <div class="main-tab-nav">
            <button class="main-tab-btn active" data-target="panel-issue">이슈 작성</button>
            <button class="main-tab-btn" data-target="panel-calendar">일정 관리</button>
            <button class="main-tab-btn" data-target="panel-completion">완료문</button>
        </div>

        <div id="panel-issue" class="main-panel-content active">
            <div class="split-layout">
                <div class="panel-col-guide">
                    <div id="guide-panel-placeholder"></div>
                </div>
                <div class="panel-col-input">
                    <div id="input-form-placeholder"></div>
                </div>
                <div class="panel-col-result">
                    <div id="result-panel-placeholder"></div>
                </div>
            </div>
        </div>

        <div id="panel-calendar" class="main-panel-content d-none">
            <div id="calendar-placeholder"></div>
        </div>

        <div id="panel-completion" class="main-panel-content d-none">
            <div id="completion-panel-placeholder"></div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <div id="bookmark-modal-placeholder"></div>
    <div id="bugreport-modal-placeholder"></div>
    <div id="changelog-modal-placeholder"></div>
    <div id="condition-modal-placeholder"></div>
    <div id="history-modal-placeholder"></div>
    <div id="kpi-modal-placeholder"></div>
    <div id="schedule-detail-modal-placeholder"></div>
    <div id="schedule-modal-placeholder"></div>
    <div id="setting-modal-placeholder"></div>
    <div id="theme-modal-placeholder"></div>
    <div id="admin-modal-placeholder"></div>
</body>
</html>
