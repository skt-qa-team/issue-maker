<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA System</title>
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/variables.css">
    <link rel="stylesheet" href="css/layout/layout.css">
    <link rel="stylesheet" href="css/layout/header.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/inputs.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/modals/modal-base.css">
    <link rel="stylesheet" href="css/modals/admin.css">
    <link rel="stylesheet" href="css/modals/bookmark.css">
    <link rel="stylesheet" href="css/modals/bugreport-modal.css">
    <link rel="stylesheet" href="css/modals/completion.css">
    <link rel="stylesheet" href="css/modals/condition.css">
    <link rel="stylesheet" href="css/modals/history.css">
    <link rel="stylesheet" href="css/modals/kpi.css">
    <link rel="stylesheet" href="css/modals/settings.css">
    <link rel="stylesheet" href="css/modals/theme.css">
    <link rel="stylesheet" href="css/modals/auth.css">
    <link rel="stylesheet" href="css/modals/calendar.css">
    <link rel="stylesheet" href="css/modals/main.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-container">
        <div class="main-tab-nav">
            <button class="main-tab-btn active" data-target="panel-issue">이슈 작성</button>
            <button class="main-tab-btn" data-target="panel-calendar">일정 관리</button>
            <button class="main-tab-btn" data-target="panel-completion">완료문</button>
        </div>

        <div id="panel-issue" class="main-panel-content active">
            <div class="split-layout">
                <div class="left-panel">
                    <div id="input-form-placeholder"></div>
                </div>
                <div class="right-panel">
                    <div id="guide-panel-placeholder"></div>
                    <div id="result-panel-placeholder"></div>
                </div>
            </div>
        </div>

        <div id="panel-calendar" class="main-panel-content d-none">
            <div id="calendar-placeholder"></div>
        </div>

        <div id="panel-completion" class="main-panel-content d-none">
            <div id="completion-panel-placeholder"></div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <div id="bookmark-modal-placeholder"></div>
    <div id="bugreport-modal-placeholder"></div>
    <div id="changelog-modal-placeholder"></div>
    <div id="condition-modal-placeholder"></div>
    <div id="history-modal-placeholder"></div>
    <div id="kpi-modal-placeholder"></div>
    <div id="schedule-detail-modal-placeholder"></div>
    <div id="schedule-modal-placeholder"></div>
    <div id="setting-modal-placeholder"></div>
    <div id="theme-modal-placeholder"></div>

    <script src="js/firebase-auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/bookmark.js"></script>
    <script src="js/bugreport-modal.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/changelog.js"></script>
    <script src="js/completion.js"></script>
    <script src="js/condition.js"></script>
    <script src="js/history.js"></script>
    <script src="js/kpi.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/template.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/ux.js"></script>
    <script src="js/loader.js"></script>
</body>
</html>
