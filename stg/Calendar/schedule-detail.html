<div id="schedule-detail-modal" class="modal-overlay d-none">
    <div class="modal-content modal-schedule-fixed">
        <div id="detail_color_bar" class="cal-detail-color-bar"></div>
        
        <div class="modal-header">
            <h2 id="detail_title"></h2>
            <button id="btn-close-detail" class="close-btn">×</button>
        </div>

        <div class="modal-body">
            <div class="cal-detail-date-badge">
                <span id="detail_date"></span>
            </div>

            <div class="cal-detail-info-box">
                <div class="form-group d-none" id="detail_author_wrapper">
                    <label>작성자</label>
                    <div id="detail_author" class="cal-detail-value-author"></div>
                </div>

                <div class="form-group d-none" id="detail_poc_wrapper">
                    <label>POC</label>
                    <div id="detail_poc" class="cal-detail-value-text"></div>
                </div>

                <div class="form-group d-none" id="detail_op_ticket_wrapper">
                    <label>운영티켓</label>
                    <div id="detail_op_ticket" class="cal-detail-value-text"></div>
                </div>

                <div class="form-group d-none" id="detail_ticket_wrapper">
                    <label>검증티켓</label>
                    <div id="detail_ticket" class="cal-detail-value-text"></div>
                </div>
                
                <div class="form-group">
                    <label>상세 내용</label>
                    <div id="detail_desc" class="cal-detail-value-desc"></div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <div class="modal-footer-left">
                <button id="btn-delete-sch" class="btn-remove">삭제</button>
            </div>
            <div class="modal-footer-right">
                <button id="btn-sync-kpi" class="btn-secondary d-none">📊 KPI와 연동</button>
                <button id="btn-edit-sch" class="btn-secondary">수정</button>
                <button id="btn-start-workflow" class="btn-primary d-none">🚀 일정 시작</button>
            </div>
        </div>
    </div>
</div>
