<div class="modal-overlay" id="scheduleModal" style="display: none;">
    <div class="modal-content">
        <button class="close-btn" onclick="closeScheduleModal()">×</button>
        <div class="modal-header">
            <h2>📅 일정 등록/수정</h2>
        </div>
        
        <input type="hidden" id="sch_id">
        <div id="ai_quota_info" class="quota-info">⚡ 오늘 AI 자동 등록 남은 횟수: 20 / 20</div>

        <div class="form-group">
            <label>라벨 (일정 유형)</label>
            <div class="radio-tab-group" id="sch_type_group">
                <label class="radio-tab" style="color:#3b82f6;"><input type="radio" name="sch_color" value="#3b82f6" data-type="검증" checked><span>검증</span></label>
                <label class="radio-tab" style="color:#f59e0b;"><input type="radio" name="sch_color" value="#f59e0b" data-type="회의"><span>회의</span></label>
                <label class="radio-tab" style="color:#10b981;"><input type="radio" name="sch_color" value="#10b981" data-type="할일"><span>할 일</span></label>
                <label class="radio-tab" style="color:#8b5cf6;"><input type="radio" name="sch_color" value="#8b5cf6" data-type="기타"><span>기타</span></label>
            </div>
        </div>

        <div class="form-group">
            <label>일정 제목 *</label>
            <input type="text" id="sch_title" class="form-control" placeholder="일정 제목을 입력하세요">
        </div>
        
        <div class="grid-2" id="date_group">
            <div class="form-group">
                <label id="label_sch_start">시작일 *</label>
                <input type="date" id="sch_start" class="form-control">
            </div>
            <div class="form-group" id="group_sch_end">
                <label>종료일 *</label>
                <input type="date" id="sch_end" class="form-control">
            </div>
        </div>
        
        <div class="form-group" id="group_sch_epic">
            <label>Epic Link</label>
            <input type="text" id="sch_epic" class="form-control" placeholder="예: SKM-1024">
        </div>
        
        <div class="form-group">
            <label>상세 내용</label>
            <textarea id="sch_desc" class="form-control"></textarea>
        </div>
        
        <button class="btn-save" onclick="saveSchedule()">일정 저장</button>

        <div class="ai-dropzone" id="ai_dropzone" onclick="document.getElementById('ai_image_input').click()">
            <input type="file" id="ai_image_input" accept="image/*" style="display: none;">
            <div id="ai_dropzone_content">
                <div class="ai-icon">✨📸</div>
                <div class="ai-title">스크린샷 AI 자동 분석</div>
                <div class="ai-desc">이미지를 드래그하거나 클릭하여 업로드하세요</div>
            </div>
            <div id="ai_loading_content" style="display: none;">
                <div class="spinner">⏳</div>
                <div class="ai-title">Gemini가 일정을 추출하고 있습니다...</div>
            </div>
        </div>
    </div>
</div>
