<div class="modal-overlay" id="scheduleModal" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
        <button class="close-btn" onclick="closeScheduleModal()">×</button>
        <div class="modal-header"><h2 style="margin-bottom: 20px;">📅 QA 및 배포 일정 등록</h2></div>
        
        <div class="form-group">
            <label>일정 제목</label>
            <input type="text" id="sch_title" placeholder="예: V21.18 상용 배포 QA">
        </div>
        
        <div class="grid-2" style="gap: 15px; margin-bottom: 15px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label>시작일</label>
                <input type="date" id="sch_start">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>종료일</label>
                <input type="date" id="sch_end">
            </div>
        </div>
        
        <div class="form-group">
            <label style="color: var(--accent-blue); font-weight: bold;">🔗 Epic Link (이슈 폼 자동 연동)</label>
            <input type="text" id="sch_epic" placeholder="예: SKM-1024">
        </div>
        
        <div class="form-group">
            <label>일정 라벨 색상</label>
            <div class="radio-tab-group small" style="display: flex; gap: 8px;">
                <label class="radio-tab"><input type="radio" name="sch_color" value="#3b82f6" checked> <span style="font-weight: bold; color: #3b82f6;">검증</span></label>
                <label class="radio-tab"><input type="radio" name="sch_color" value="#10b981"> <span style="font-weight: bold; color: #10b981;">배포</span></label>
                <label class="radio-tab"><input type="radio" name="sch_color" value="#ef4444"> <span style="font-weight: bold; color: #ef4444;">핫픽스</span></label>
                <label class="radio-tab"><input type="radio" name="sch_color" value="#8b5cf6"> <span style="font-weight: bold; color: #8b5cf6;">기타</span></label>
            </div>
        </div>
        
        <div class="form-group">
            <label>상세 내용 (선택)</label>
            <textarea id="sch_desc" placeholder="테스트 범위, 특이사항 등을 입력하세요" style="height: 80px;"></textarea>
        </div>
        
        <div class="modal-actions" style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn-save" style="flex: 1;" onclick="saveSchedule()">💾 일정 전사 공유</button>
            <button class="btn-case-main" style="flex: 1; background: var(--accent-blue); color: white; border: none;" onclick="startScheduleWorkflow()">🚀 일정 시작 (Epic 연동)</button>
        </div>
    </div>
</div>
