<div class="modal-overlay" id="scheduleModal" style="display: none;">
    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .ai-dropzone { border: 2px dashed #3b82f6; border-radius: 8px; padding: 25px; text-align: center; margin-bottom: 20px; cursor: pointer; background: rgba(59, 130, 246, 0.05); transition: background 0.2s; }
        .ai-dropzone:hover { background: rgba(59, 130, 246, 0.1); }
        .ai-dropzone.dragover { background: rgba(59, 130, 246, 0.15); border-color: #2563eb; }
    </style>
    <div class="modal-content" style="max-width: 600px; width: 90%; padding: 30px; border-top: 6px solid var(--accent-blue); border-radius: 16px;">
        <button class="close-btn" onclick="closeScheduleModal()" style="top: 20px; right: 20px;">×</button>
        <div class="modal-header" style="margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <h2 style="margin: 0; font-weight: 800;">📅 일정 등록/수정</h2>
        </div>
        
        <input type="hidden" id="sch_id">

        <div class="ai-dropzone" id="ai_dropzone" onclick="document.getElementById('ai_image_input').click()">
            <input type="file" id="ai_image_input" accept="image/*" style="display: none;">
            <div id="ai_dropzone_content">
                <div style="font-size: 2rem; margin-bottom: 10px;">✨📸</div>
                <div style="font-weight: 800; color: #3b82f6; margin-bottom: 5px;">스크린샷 AI 자동 분석</div>
                <div style="font-size: 0.8rem; color: #6b7280;">이미지를 드래그하거나 클릭하여 업로드하세요</div>
            </div>
            <div id="ai_loading_content" style="display: none;">
                <div style="font-size: 2rem; margin-bottom: 10px; display: inline-block; animation: spin 1s linear infinite;">⏳</div>
                <div style="font-weight: 800; color: #3b82f6;">Gemini가 일정을 추출하고 있습니다...</div>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 700; margin-bottom: 8px; display: block;">일정 제목 *</label>
            <input type="text" id="sch_title" placeholder="일정 제목을 입력하세요" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
        </div>
        
        <div class="grid-2" style="gap: 20px; margin-bottom: 20px;">
            <div class="form-group">
                <label style="font-weight: 700; margin-bottom: 8px; display: block;">시작일 *</label>
                <input type="date" id="sch_start" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;">
            </div>
            <div class="form-group">
                <label style="font-weight: 700; margin-bottom: 8px; display: block;">종료일 *</label>
                <input type="date" id="sch_end" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;">
            </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 700; margin-bottom: 8px; display: block;">Epic Link</label>
            <input type="text" id="sch_epic" placeholder="예: SKM-1024" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 700; margin-bottom: 8px; display: block;">라벨 색상</label>
            <div class="radio-tab-group" style="display: flex; gap: 8px;">
                <label class="radio-tab" style="flex: 1;"><input type="radio" name="sch_color" value="#3b82f6" checked><span style="color:#3b82f6; font-weight: 800;">검증</span></label>
                <label class="radio-tab" style="flex: 1;"><input type="radio" name="sch_color" value="#10b981"><span style="color:#10b981; font-weight: 800;">배포</span></label>
                <label class="radio-tab" style="flex: 1;"><input type="radio" name="sch_color" value="#ef4444"><span style="color:#ef4444; font-weight: 800;">핫픽스</span></label>
                <label class="radio-tab" style="flex: 1;"><input type="radio" name="sch_color" value="#8b5cf6"><span style="color:#8b5cf6; font-weight: 800;">기타</span></label>
            </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 700; margin-bottom: 8px; display: block;">상세 내용</label>
            <textarea id="sch_desc" style="width: 100%; height: 80px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; resize: none;"></textarea>
        </div>
        
        <button class="btn-save" style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 800; background: var(--accent-blue); color: white; border: none; border-radius: 8px; cursor: pointer;" onclick="saveSchedule()">💾 일정 저장 및 전사 공유</button>
    </div>
</div>
