<div class="modal-overlay" id="settingModal">
    <div class="modal-content modal-lg">
        <div class="modal-header">
            <h2>⚙️ 환경 설정</h2>
            <button class="close-btn" onclick="window.closeSettingModal()">×</button>
        </div>
        
        <div class="modal-body">
            <div class="setting-box">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Admin URL</label>
                        <input type="text" id="set_admin_url" placeholder="https://admin.example.com">
                    </div>
                    <div class="form-group">
                        <label>PC URL</label>
                        <input type="text" id="set_pc_url" placeholder="https://www.example.com">
                    </div>
                </div>
            </div>
            
            <div class="setting-box">
                <label class="os-title and-title">🟢 Android Settings</label>
                <div class="form-group">
                    <label class="sub-label">AppTester 버전</label>
                    <input type="text" id="set_and_apptester" placeholder="v1.0.0">
                </div>
                <div class="setting-grid-3">
                    <div class="form-group">
                        <label class="sub-label">검증단말 풀</label>
                        <textarea id="set_and_devices" class="setting-textarea" placeholder="줄바꿈으로 구분"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="sub-label">특수단말 풀</label>
                        <textarea id="set_and_special" class="setting-textarea" placeholder="줄바꿈으로 구분"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="sub-label">기본 선택 단말</label>
                        <textarea id="set_and_default" class="setting-textarea" placeholder="자동 체크될 단말 명칭"></textarea>
                    </div>
                </div>
            </div>
            
            <div class="setting-box">
                <label class="os-title ios-title">🔵 iOS Settings</label>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="sub-label">TestFlight 버전</label>
                        <input type="text" id="set_ios_testflight" placeholder="v1.0.0 (00)">
                    </div>
                    <div class="form-group">
                        <label class="sub-label">AD 버전</label>
                        <input type="text" id="set_ios_distribution" placeholder="v1.0.0">
                    </div>
                </div>
                <div class="setting-grid-3">
                    <div class="form-group">
                        <label class="sub-label">검증단말 풀</label>
                        <textarea id="set_ios_devices" class="setting-textarea" placeholder="줄바꿈으로 구분"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="sub-label">특수단말 풀</label>
                        <textarea id="set_ios_special" class="setting-textarea" placeholder="줄바꿈으로 구분"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="sub-label">기본 선택 단말</label>
                        <textarea id="set_ios_default" class="setting-textarea" placeholder="자동 체크될 단말 명칭"></textarea>
                    </div>
                </div>
            </div>

            <div class="setting-box">
                <label class="os-title browser-title">🌐 Browser Version Management</label>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="sub-label">Samsung Internet</label>
                        <input type="text" id="set_samsung_browser">
                    </div>
                    <div class="form-group">
                        <label class="sub-label">Safari</label>
                        <input type="text" id="set_safari_browser">
                    </div>
                    <div class="form-group">
                        <label class="sub-label">Chrome</label>
                        <input type="text" id="set_chrome_browser">
                    </div>
                    <div class="form-group">
                        <label class="sub-label">Edge</label>
                        <input type="text" id="set_edge_browser">
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-save" onclick="window.saveSettings()">✅ 설정 저장 및 동기화</button>
        </div>
    </div>
</div>
