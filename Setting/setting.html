<div class="modal-overlay" id="settingModal">
    <div class="modal-content modal-lg">
        <button class="close-btn" onclick="window.closeSettingModal()">×</button>
        <div class="modal-header"><h2>⚙️ 환경 설정</h2></div>
        
        <div class="setting-box">
            <div class="grid-2">
                <div class="form-group">
                    <label>Admin URL</label>
                    <input type="text" id="set_admin_url">
                </div>
                <div class="form-group">
                    <label>PC URL</label>
                    <input type="text" id="set_pc_url">
                </div>
            </div>
        </div>
        
        <div class="setting-box">
            <label class="os-title and-title">🟢 Android</label>
            <div class="form-group">
                <label class="sub-label">버전</label>
                <input type="text" id="set_and_apptester">
            </div>
            <div class="setting-grid-3">
                <div class="form-group">
                    <label class="sub-label">검증단말 풀</label>
                    <textarea id="set_and_devices" class="setting-textarea" placeholder="줄바꿈으로 구분"></textarea>
                </div>
                <div class="form-group">
                    <label class="sub-label">특수단말 풀</label>
                    <textarea id="set_and_special" class="setting-textarea" placeholder="줄바꿈으로 구분"></textarea>
                </div>
                <div class="form-group">
                    <label class="sub-label">기본 선택 단말</label>
                    <textarea id="set_and_default" class="setting-textarea" placeholder="자동 체크될 단말 (줄바꿈 구분)"></textarea>
                </div>
            </div>
        </div>
        
        <div class="setting-box">
            <label class="os-title ios-title">🔵 iOS</label>
            <div class="grid-2">
                <div class="form-group">
                    <label class="sub-label">TF 버전</label>
                    <input type="text" id="set_ios_testflight">
                </div>
                <div class="form-group">
                    <label class="sub-label">AD 버전</label>
                    <input type="text" id="set_ios_distribution">
                </div>
            </div>
            <div class="setting-grid-3">
                <div class="form-group">
                    <label class="sub-label">검증단말 풀</label>
                    <textarea id="set_ios_devices" class="setting-textarea" placeholder="줄바꿈으로 구분"></textarea>
                </div>
                <div class="form-group">
                    <label class="sub-label">특수단말 풀</label>
                    <textarea id="set_ios_special" class="setting-textarea" placeholder="줄바꿈으로 구분"></textarea>
                </div>
                <div class="form-group">
                    <label class="sub-label">기본 선택 단말</label>
                    <textarea id="set_ios_default" class="setting-textarea" placeholder="자동 체크될 단말 (줄바꿈 구분)"></textarea>
                </div>
            </div>
        </div>

        <div class="setting-box">
            <label class="os-title browser-title">🌐 브라우저 버전 관리</label>
            <div class="grid-2">
                <div class="form-group">
                    <label class="sub-label">삼성 브라우저</label>
                    <input type="text" id="set_samsung_browser">
                </div>
                <div class="form-group">
                    <label class="sub-label">Safari</label>
                    <input type="text" id="set_safari_browser">
                </div>
                <div class="form-group">
                    <label class="sub-label">크롬</label>
                    <input type="text" id="set_chrome_browser">
                </div>
                <div class="form-group">
                    <label class="sub-label">Edge</label>
                    <input type="text" id="set_edge_browser">
                </div>
            </div>
        </div>
        
        <button class="btn-save" onclick="window.saveSettings()">✅ 설정 저장</button>
    </div>
</div>
