<div class="modal-overlay" id="theme-modal">
    <div class="modal-content modal-md">
        <div class="modal-header">
            <h2>🎨 테마 커스텀</h2>
            <button class="close-btn" onclick="window.QA_CORE.Theme.closeModal()">×</button>
        </div>
        
        <div class="modal-body">
            <div class="setting-box">
                <label class="form-label-accent mb-2">🌟 프리셋</label>
                <div id="preset_buttons_container" class="theme-preset-container"></div>
            </div>
            
            <div class="setting-box color-picker-group">
                <div class="color-row">
                    <label class="color-label">배경 (Background)</label>
                    <input type="color" id="picker_bg" oninput="window.QA_CORE.Theme.preview()">
                </div>
                <div class="color-row">
                    <label class="color-label">패널 (Panel)</label>
                    <input type="color" id="picker_panel" oninput="window.QA_CORE.Theme.preview()">
                </div>
                <div class="color-row">
                    <label class="color-label">메인 글자 (Main Text)</label>
                    <input type="color" id="picker_text_main" oninput="window.QA_CORE.Theme.preview()">
                </div>
                <div class="color-row">
                    <label class="color-label">서브 글자 (Sub Text)</label>
                    <input type="color" id="picker_text_sub" oninput="window.QA_CORE.Theme.preview()">
                </div>
                <div class="color-row">
                    <label class="color-label">테두리 (Border)</label>
                    <input type="color" id="picker_border" oninput="window.QA_CORE.Theme.preview()">
                </div>
                <div class="color-row">
                    <label class="color-label">강조 (Accent)</label>
                    <input type="color" id="picker_accent" oninput="window.QA_CORE.Theme.preview()">
                </div>
            </div>
        </div>
        
        <div class="modal-footer">
            <div class="grid-2 theme-action-row" style="width: 100%;">
                <button class="btn-clear-sm btn-theme-reset" onclick="window.QA_CORE.Theme.reset()">초기화</button>
                <button id="btnSaveTheme" class="btn-save btn-theme-save" onclick="window.QA_CORE.Theme.save()">✅ 저장</button>
            </div>
        </div>
    </div>
</div>
