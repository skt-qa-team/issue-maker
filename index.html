<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[SKM] 이슈틀 생성기 - V21.13</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/completion.css">
    <link rel="stylesheet" href="css/kpi.css">
</head>
<body>

    <div class="top-action-bar">
        <div class="top-bar-left-group">
            <div id="currentTime" class="current-time">일시 로딩 중...</div>
            <div id="presence-list" class="presence-list"></div>
        </div>
        
        <div class="top-bar-center-group">
            <div class="top-bar-title">
                <span class="main-title">[SKM] 이슈틀 생성기</span>
                <span class="version-info">- V21.13</span>
            </div>
        </div>

        <div class="top-bar-btns">
            <div class="menu-item-wrapper" onclick="openKpiModal()">
                <div class="setting-btn-float" style="background: linear-gradient(135deg, #a855f7, #7e22ce); border-color: #9333ea;">📊</div>
                <span class="menu-label">KPI</span>
            </div>
            <div class="menu-item-wrapper" onclick="openCompletionModal()">
                <div class="setting-btn-float" style="background: #10b981; border-color: #059669;">✅</div>
                <span class="menu-label">완료문</span>
            </div>
            <a href="https://gwp.ktbizoffice.com/EKPHome/Login?compid=wisestone" target="_blank" class="menu-item-wrapper" style="text-decoration: none;">
                <div class="setting-btn-float groupware-btn">🏢</div>
                <span class="menu-label">그룹웨어</span>
            </a>
            <div class="menu-item-wrapper" onclick="openThemeModal()">
                <div class="setting-btn-float">🎨</div>
                <span class="menu-label">테마</span>
            </div>
            <div class="menu-item-wrapper" onclick="openChangelogModal()">
                <div class="setting-btn-float">📜</div>
                <span class="menu-label">변경사항</span>
            </div>
            <div class="menu-item-wrapper" onclick="openModal()">
                <div class="setting-btn-float">⚙️</div>
                <span class="menu-label">설정</span>
            </div>
            <div class="menu-item-wrapper" onclick="toggleAuth()">
                <div class="setting-btn-float" id="auth-btn-icon" style="background: var(--accent-red);">G</div>
                <span class="menu-label" id="auth-btn-label">⏳ 대기중</span>
            </div>
        </div>
    </div>

    <div class="header-horizontal-divider"></div>

    <div class="wrapper">
        <div class="panel guide-panel" id="guide-area">
            <h2>📘 사용 설명서</h2>
            <div class="guide-step">
                <h3>1. Prefix 고도화 (V21.13)</h3>
                <p>정해진 순서에 맞춰 제목이 자동 생성됩니다.</p>
            </div>
            <div class="guide-divider"></div>
            <div class="guide-step">
                <h3>2. 모듈화 아키텍처</h3>
                <p>복잡한 구조를 분리하여 로딩 속도를 최적화했습니다.</p>
            </div>
            
            <div class="extra-input-section" style="margin-top: auto;">
                <div class="form-group">
                    <label>🔗 Epic Link</label>
                    <input type="text" id="epic_link" placeholder="에픽 링크를 입력하세요" oninput="generateTemplate()">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>💡 검증 참고사항</label>
                    <textarea id="extra_notes" style="height: 120px;" placeholder="참고 내용을 입력하세요"></textarea>
                </div>
            </div>
        </div>

        <div class="panel main-input-panel">
            <h2 style="margin-top: 0; margin-bottom: 20px;">📝 이슈 내용 입력</h2>
            <div class="form-group">
                <label style="color:#ef4444 !important;">📌 현상 요약</label>
                <input type="text" id="title" placeholder="현상을 입력하세요" oninput="generateTemplate()">
            </div>
            
            <div id="prefix-container"></div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>OS 구분</label>
                    <select id="osType" onchange="syncEnvironmentByOS()"></select>
                </div>
                <div class="form-group">
                    <label>POC</label>
                    <select id="poc" onchange="handlePocChange()"></select>
                </div>
            </div>
            
            <div id="dynamic-input-area"></div>
        </div>

        <div class="panel result-panel">
            <div class="result-header">
                <h2>📄 리포트 결과</h2>
                <button class="btn-clear-top" onclick="clearForm()">🔄 새로 작성</button>
            </div>
            <div id="output-container" style="flex: 1; display: flex; flex-direction: column;"></div>
        </div>
    </div>

    <div id="modal-registry"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="changelog.js"></script>
    <script src="js/render.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/completion.js"></script>
    <script src="js/main.js"></script>
    <script src="js/kpi.js"></script>
</body>
</html>
