<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이슈틀 자동 생성기 - V3 (다중 기기 & 서버 지원)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .wrapper { width: 100%; max-width: 1200px; display: flex; gap: 20px; align-items: flex-start; }
        .tab-menu { width: 100%; max-width: 1200px; margin-bottom: 20px; display: flex; gap: 10px; }
        .tab-btn { flex: 1; padding: 15px; background-color: #e4e6eb; color: #333; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background-color: #0d6efd; color: white; box-shadow: 0 4px 6px rgba(13, 110, 253, 0.2); }
        .container { flex: 1.3; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; }
        .container.active { display: block; }
        .result-container { flex: 0.7; background: #212529; padding: 30px; border-radius: 12px; color: #fff; position: sticky; top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h2 { font-size: 1.3rem; margin-top: 0; color: #212529; border-left: 5px solid #0d6efd; padding-left: 10px; margin-bottom: 20px; }
        .result-container h2 { color: #f8f9fa; border-left-color: #198754; }
        
        .form-group { margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #495057; }
        input[type="text"], textarea, select { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; transition: border-color 0.15s; }
        input[type="text"]:focus, textarea:focus, select:focus { border-color: #86b7fe; outline: 0; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
        textarea { height: 80px; resize: vertical; }
        
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; background-color: #f8f9fa; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: normal; font-size: 0.95rem; margin: 0; color: #212529; }
        .checkbox-label input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        
        .btn-save { background-color: #198754; color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-save:hover { background-color: #157347; }
        .btn-copy { background-color: #0d6efd; color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-copy:hover { background-color: #0b5ed7; }
        
        #outputArea { width: 100%; height: 550px; font-family: 'Consolas', 'Courier New', monospace; padding: 15px; border: none; background-color: #2b3035; color: #f8f9fa; white-space: pre-wrap; box-sizing: border-box; resize: none; font-size: 0.95rem; line-height: 1.6; border-radius: 6px; }
        
        .setting-box { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .badge-and { color: #198754; font-weight: bold; margin-bottom: 15px; display: block; border-bottom: 1px solid #dee2e6; padding-bottom: 5px;}
        .badge-ios { color: #6c757d; font-weight: bold; margin-bottom: 15px; display: block; border-bottom: 1px solid #dee2e6; padding-bottom: 5px;}
    </style>
</head>
<body>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('issueTab')" id="btnIssue">📝 이슈 작성</button>
        <button class="tab-btn" onclick="switchTab('settingsTab')" id="btnSettings">⚙️ 환경 설정 (기본값 설정)</button>
    </div>

    <div class="wrapper">
        <!-- 환경 설정 탭 -->
        <div id="settingsTab" class="container">
            <h2>⚙️ 기본 환경 설정</h2>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>기본 POC</label>
                    <select id="set_poc">
                        <option value="T 멤버십">T 멤버십</option>
                        <option value="PC Web">PC Web</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>기본 서버 (다중 선택)</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="set-server-cb" value="STG" checked> STG</label>
                        <label class="checkbox-label"><input type="checkbox" class="set-server-cb" value="DEV"> DEV</label>
                        <label class="checkbox-label"><input type="checkbox" class="set-server-cb" value="PRD"> PRD</label>
                    </div>
                </div>
            </div>

            <div class="setting-box">
                <span class="badge-and">Android 전용 설정</span>
                <div class="form-group">
                    <label>Android 디바이스 (엔터로 구분하여 여러 기기 입력)</label>
                    <textarea id="set_and_devices" placeholder="갤럭시 폴드7(16)&#10;갤럭시 S24 Ultra(14)"></textarea>
                </div>
                <div class="form-group">
                    <label>Android 앱 버전 (Apptest)</label>
                    <input type="text" id="set_and_ver" placeholder="예: App Tester_20.5.11(855)">
                </div>
            </div>

            <div class="setting-box">
                <span class="badge-ios">iOS 전용 설정</span>
                <div class="form-group">
                    <label>iOS 디바이스 (엔터로 구분하여 여러 기기 입력)</label>
                    <textarea id="set_ios_devices" placeholder="iPhone 11 Pro(17.2.1)&#10;iPhone 15(17.4)"></textarea>
                </div>
                <div class="form-group">
                    <label>iOS 앱 버전 (TestFlight)</label>
                    <input type="text" id="set_ios_ver" placeholder="예: TestFlight_20.5.10(3)">
                </div>
            </div>

            <button class="btn-save" onclick="saveSettings()">✅ 설정 저장 및 적용하기</button>
        </div>

        <!-- 이슈 작성 탭 -->
        <div id="issueTab" class="container active">
            <h2>📝 이슈 내용 입력</h2>
            <div class="form-group">
                <label>제목 (현상 요약)</label>
                <input type="text" id="title" placeholder="현상을 간략히 작성하세요" oninput="generateTemplate()">
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>OS 구분 (선택 시 디바이스/버전 자동 변경)</label>
                    <select id="osType" onchange="syncEnvironmentByOS()">
                        <option value="[Android/iOS]">[Android/iOS] 공통</option>
                        <option value="[Android]">[Android]</option>
                        <option value="[iOS]">[iOS]</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>POC</label>
                    <select id="poc" onchange="generateTemplate()">
                        <option value="T 멤버십">T 멤버십</option>
                        <option value="PC Web">PC Web</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>서버 (다중 선택 가능)</label>
                <div class="checkbox-group" id="serverCheckboxes">
                    <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="STG" onchange="generateTemplate()"> STG</label>
                    <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="DEV" onchange="generateTemplate()"> DEV</label>
                    <label class="checkbox-label"><input type="checkbox" class="issue-server-cb" value="PRD" onchange="generateTemplate()"> PRD</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>디바이스 선택 (OS 변경 시 자동 갱신)</label>
                <div class="checkbox-group" id="deviceCheckboxes">
                    <!-- 자바스크립트를 통해 동적으로 체크박스가 생성됩니다 -->
                </div>
            </div>
            
            <div class="form-group">
                <label>앱 버전</label>
                <input type="text" id="appVersion" oninput="generateTemplate()">
            </div>

            <div class="form-group"><label>[Pre-Condition]</label><textarea id="preCondition" oninput="generateTemplate()"></textarea></div>
            <div class="form-group"><label>[재현스텝]</label><textarea id="steps" oninput="generateTemplate()"></textarea></div>
            <div class="form-group"><label>[실행결과-문제현상]</label><textarea id="actualResult" oninput="generateTemplate()"></textarea></div>
            <div class="form-group"><label>[기대결과]</label><textarea id="expectedResult" oninput="generateTemplate()"></textarea></div>
            <div class="form-group"><label>[참고사항]</label><textarea id="notes" oninput="generateTemplate()"></textarea></div>
        </div>

        <!-- 결과 탭 -->
        <div class="result-container">
            <h2>📄 리포트 결과</h2>
            <textarea id="outputArea" readonly></textarea>
            <button class="btn-copy" onclick="copyToClipboard()">📋 클립보드 복사</button>
        </div>
    </div>

    <script>
        // 탭 전환 로직
        function switchTab(tabId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 설정 저장 로직 (localStorage 활용)
        function saveSettings() {
            // 다중 기기 입력을 줄바꿈 기준으로 배열로 변환
            const getDevices = (id) => document.getElementById(id).value.split('\n').map(s => s.trim()).filter(Boolean);
            const getCheckedServers = () => Array.from(document.querySelectorAll('.set-server-cb:checked')).map(cb => cb.value);

            const data = {
                poc: document.getElementById('set_poc').value,
                servers: getCheckedServers(),
                andDevices: getDevices('set_and_devices'),
                andVer: document.getElementById('set_and_ver').value,
                iosDevices: getDevices('set_ios_devices'),
                iosVer: document.getElementById('set_ios_ver').value
            };
            
            localStorage.setItem('qa_config_v3', JSON.stringify(data));
            alert('환경 설정이 저장되었습니다.');
            syncEnvironmentByOS(); 
            switchTab('issueTab');
        }

        // OS 선택에 따른 디바이스/버전 동기화 (가장 핵심 로직)
        function syncEnvironmentByOS() {
            const config = JSON.parse(localStorage.getItem('qa_config_v3')) || { 
                poc: 'T 멤버십', servers: ['STG'], andDevices: [], iosDevices: [], andVer: '', iosVer: '' 
            };
            const osType = document.getElementById('osType').value;
            
            // 1. POC 동기화
            document.getElementById('poc').value = config.poc;

            // 2. 서버 체크박스 동기화
            document.querySelectorAll('.issue-server-cb').forEach(cb => {
                cb.checked = config.servers.includes(cb.value);
            });

            // 3. 디바이스 체크박스 동적 렌더링
            const deviceContainer = document.getElementById('deviceCheckboxes');
            deviceContainer.innerHTML = ''; // 기존 목록 초기화
            let devicesToRender = [];

            if (osType === "[Android]" || osType === "[Android/iOS]") {
                devicesToRender = devicesToRender.concat(config.andDevices);
            }
            if (osType === "[iOS]" || osType === "[Android/iOS]") {
                devicesToRender = devicesToRender.concat(config.iosDevices);
            }

            if (devicesToRender.length === 0) {
                deviceContainer.innerHTML = '<span style="color:#6c757d; font-size:0.9rem;">설정에서 디바이스를 먼저 등록해주세요.</span>';
            } else {
                devicesToRender.forEach(dev => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-label';
                    label.innerHTML = `<input type="checkbox" class="issue-device-cb" value="${dev}" onchange="generateTemplate()" checked> ${dev}`;
                    deviceContainer.appendChild(label);
                });
            }

            // 4. 앱 버전 동기화
            let targetVer = "";
            if (osType === "[Android/iOS]") targetVer = [config.andVer, config.iosVer].filter(Boolean).join(' / ');
            else if (osType === "[Android]") targetVer = config.andVer;
            else if (osType === "[iOS]") targetVer = config.iosVer;
            
            document.getElementById('appVersion').value = targetVer;

            generateTemplate(); // 변경 후 결과 렌더링
        }

        // 결과물 조합 및 렌더링 로직
        function generateTemplate() {
            const getValue = (id) => document.getElementById(id).value;
            
            // 체크된 서버 및 기기 수집 후 슬래시(/)로 결합
            const checkedServers = Array.from(document.querySelectorAll('.issue-server-cb:checked')).map(cb => cb.value).join(' / ');
            const checkedDevices = Array.from(document.querySelectorAll('.issue-device-cb:checked')).map(cb => cb.value).join(' / ');
            
            const template = `${getValue('osType')} ${getValue('title')}
[Environment]
■ POC : ${getValue('poc')}
■ Device(OS Ver.) : ${checkedDevices || '선택된 기기 없음'}
■ 서버 : ${checkedServers || '선택된 서버 없음'}
■ 버전 : ${getValue('appVersion')}

[Pre-Condition]
${getValue('preCondition')}

[재현스텝]
${getValue('steps')}

[실행결과-문제현상]
${getValue('actualResult')}

[기대결과]
${getValue('expectedResult')}

[참고사항]
${getValue('notes')}`;

            document.getElementById('outputArea').value = template;
        }

        // 클립보드 복사
        function copyToClipboard() {
            const outputText = document.getElementById('outputArea');
            outputText.select();
            document.execCommand('copy');
            alert('클립보드 복사 완료!');
        }

        // 초기 구동 시 데이터 로딩
        window.onload = function() {
            const config = JSON.parse(localStorage.getItem('qa_config_v3'));
            if(config) {
                document.getElementById('set_poc').value = config.poc || 'T 멤버십';
                document.getElementById('set_and_devices').value = (config.andDevices || []).join('\n');
                document.getElementById('set_ios_devices').value = (config.iosDevices || []).join('\n');
                document.getElementById('set_and_ver').value = config.andVer || '';
                document.getElementById('set_ios_ver').value = config.iosVer || '';
                
                document.querySelectorAll('.set-server-cb').forEach(cb => {
                    if(config.servers) cb.checked = config.servers.includes(cb.value);
                });
            }
            syncEnvironmentByOS();
        };
    </script>
</body>
</html>
